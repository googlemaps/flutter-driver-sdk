name: google_driver_flutter
description: A Google Maps Driver plugin
version: 0.6.1
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  google_navigation_flutter: ^0.9.1

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  melos: ^8.0.0
  mockito: 5.6.4
  pigeon: 27.1.0

flutter:
  plugin:
    platforms:
      android:
        package: com.google.maps.flutter.driver
        pluginClass: GoogleMapsDriverPlugin
      ios:
        pluginClass: GoogleMapsDriverPlugin
