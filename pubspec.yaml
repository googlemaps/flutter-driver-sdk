name: google_maps_driver
description: A Google Maps Driver plugin
version: 0.1.0-beta
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  google_maps_navigation: 0.2.0-beta

dev_dependencies:
  build_runner: ^2.4.6
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  melos: ^3.0.1
  mockito: 5.4.4
  pigeon: 15.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.google.maps.flutter.driver
        pluginClass: GoogleMapsDriverPlugin
      ios:
        pluginClass: GoogleMapsDriverPlugin

# This dependency override can be removed once the google_maps_navigation package is published.
dependency_overrides:
  google_maps_navigation:
    git: git@github.com:googlemaps/flutter-navigation-sdk.git
