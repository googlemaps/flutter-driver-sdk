name: google_maps_driver_example
description: Demonstrates how to use the google_maps_driver plugin.
publish_to: "none"

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  google_maps_driver:
    path: ../
  http: ^1.1.2
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ">=3.2.0 <3.3.0"
  pub_semver: ^2.1.4

flutter:
  uses-material-design: true
patrol:
  app_name: Driver Example
  android:
    package_name: com.google.maps.flutter.driver_example
  ios:
    bundle_id: com.google.maps.flutter.driverExample

# This dependency override can be removed once the google_maps_navigation package is published.
dependency_overrides:
  google_maps_navigation:
    git: git@github.com:googlemaps/flutter-navigation-sdk.git
