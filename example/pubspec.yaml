name: google_driver_flutter_example
description: Demonstrates how to use the google_driver_flutter plugin.
publish_to: "none"

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  google_driver_flutter:
    path: ../
  google_navigation_flutter: ^0.8.4
  http: ^1.1.2
  meta: ^1.17.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: 3.16.0
  pub_semver: ^2.1.4
  test_api: any

flutter:
  uses-material-design: true
patrol:
  app_name: Driver Example
  test_directory: integration_test
  android:
    package_name: com.google.maps.flutter.driver_example
  ios:
    bundle_id: com.google.maps.flutter.driverExample
